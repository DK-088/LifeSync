openapi: 3.0.0
info:
  title: LifeSync AI API
  description: Smart Personal Finance & Life Management Backend with AI capabilities.
  version: 1.0.0
  contact:
    name: LifeSync AI Team
servers:
  - url: http://localhost:5000
    description: Development server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        email: { type: string }
        phone: { type: string }
        monthlyIncome: { type: number }
        savingsGoal: { type: number }

    Expense:
      type: object
      required: [amount, category]
      properties:
        amount: { type: number, minimum: 0.01 }
        category:
          {
            type: string,
            enum:
              [
                "Food & Dining",
                "Transport",
                "Shopping",
                "Entertainment",
                "Health & Medical",
                "Utilities",
                "Education",
                "Travel",
                "Groceries",
                "Rent",
                "EMI",
                "Investment",
                "Insurance",
                "Subscriptions",
                "Personal Care",
                "Others",
              ],
          }
        merchant: { type: string }
        description: { type: string }
        paymentType:
          {
            type: string,
            enum: ["UPI", "Cash", "Card", "Net Banking", "Wallet", "Others"],
          }
        source:
          {
            type: string,
            enum: ["manual", "notification", "voice", "ocr", "ai"],
          }
        tags: { type: array, items: { type: string } }
        isRecurring: { type: boolean }
        recurringFrequency:
          { type: string, enum: ["daily", "weekly", "monthly", "yearly"] }

    Error:
      type: object
      properties:
        success: { type: boolean, example: false }
        message: { type: string }

paths:
  /health:
    get:
      summary: Health check
      responses:
        200:
          description: Server is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  message: { type: string }

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name: { type: string }
                email: { type: string }
                password: { type: string, minLength: 8 }
                phone: { type: string }
                monthlyIncome: { type: number }
                savingsGoal: { type: number }
      responses:
        201:
          description: User registered successfully
        400:
          description: Bad request

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        200:
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken: { type: string }
                  refreshToken: { type: string }

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: User profile
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }

  /api/expenses:
    get:
      tags: [Expenses]
      summary: List expenses
      security: [{ bearerAuth: [] }]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: category
          in: query
          schema: { type: string }
      responses:
        200:
          description: List of expenses
    post:
      tags: [Expenses]
      summary: Create an expense
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Expense" }
      responses:
        201:
          description: Expense created

  /api/analytics/dashboard:
    get:
      tags: [Analytics]
      summary: Get dashboard overview
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: Dashboard data

  /api/voice/command:
    post:
      tags: [AI & Tools]
      summary: Process voice command
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                audio: { type: string, format: binary }
      responses:
        200:
          description: Command processed

  /api/ocr/scan:
    post:
      tags: [AI & Tools]
      summary: Scan bill image
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                bill: { type: string, format: binary }
      responses:
        200:
          description: Bill scanned
